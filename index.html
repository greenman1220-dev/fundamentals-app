<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ファンダメンタルズ分析アプリ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.9s linear infinite; }

      .no-print { display: none !important; }

<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-200">
<div id="root"></div>
<script>
// ============================================================
// デモ用会社データ
// ============================================================
const DEMO_COMPANIES = [
  { code:"7203", name:"トヨタ自動車",       sector:"輸送用機器", url:"https://global.toyota/jp/ir/" },
  { code:"6758", name:"ソニーグループ",       sector:"電気機器",   url:"https://www.sony.com/ja/SonyInfo/IR/" },
  { code:"9984", name:"ソフトバンクグループ", sector:"情報通信",   url:"https://group.softbank/ir/" },
  { code:"7974", name:"任天堂",               sector:"その他製品", url:"https://www.nintendo.co.jp/ir/" },
  { code:"6861", name:"キーエンス",           sector:"電気機器",   url:"https://www.keyence.co.jp/company/investor/" },
];

// ============================================================
// シード乱数 & デモデータ生成
// ============================================================
function seededRand(seed) {
  let s = seed | 0;
  return () => { s = (Math.imul(1664525, s) + 1013904223) | 0; return (s >>> 0) / 0x100000000; };
}

const PROFILES = {
  "7203": { baseSales:27000, growth:[0,  0, 15, 18, 21], margin:0.08 },
  "6758": { baseSales:8800,  growth:[3,  8, 12,  5, 10], margin:0.09 },
  "9984": { baseSales:5600,  growth:[-5,10, 20, -3,  8], margin:0.05 },
  "7974": { baseSales:1300,  growth:[4, 35,-15, 10, 12], margin:0.25 },
  "6861": { baseSales:5500,  growth:[5, 20, 18, 25, 15], margin:0.55 },
};

function makeFigures(code, fiscalYear, quarter) {
  const seed = code.split('').reduce((a,c)=>a+c.charCodeAt(0),0)*31 + fiscalYear*7 + (quarter||0)*3;
  const rand = seededRand(seed);
  const p = PROFILES[code] || { baseSales:1200+(seed%3000), growth:[2,5,8,6,10], margin:0.10 };

  const yIdx = fiscalYear - 2020;
  let base = p.baseSales;
  for (let i=0; i<Math.max(0,yIdx); i++) base *= (1 + (p.growth[Math.min(i+1,p.growth.length-1)]/100));

  let rev = base;
  if (quarter !== null) {
    const season = [0.22,0.24,0.26,0.28];
    rev = rev * season[quarter-1] * (0.88 + rand()*0.24);
  } else {
    rev = rev * (0.96 + rand()*0.08);
  }
  rev = Math.round(rev);

  const op  = Math.round(rev * p.margin * (0.78+rand()*0.44));
  const ord = Math.round(op  * (0.91+rand()*0.14));
  const net = Math.round(ord * (0.60+rand()*0.22));
  const eps = Math.round(net / (p.baseSales/500));

  const ta  = Math.round(rev * (1.35 + Math.max(0,yIdx)*0.09 + rand()*0.25));
  const na  = Math.round(ta  * (0.30 + rand()*0.30));
  const ocf = Math.round(op  * (1.0  + rand()*0.55));
  const icf = -Math.round(op * (0.32 + rand()*0.68));
  const fcf = -Math.round(net* (0.12 + rand()*0.55));
  const div = Math.max(0, Math.round(eps*(0.22+rand()*0.20)));

  return {
    pl: { revenue:rev, operatingProfit:op, ordinaryProfit:ord, netProfit:net, eps },
    bs: { totalAssets:ta, netAssets:na, equityRatio: Math.round(na/ta*1000)/10 },
    cf: { operating:ocf, investing:icf, financing:fcf },
    dividend: { annual:div, payoutRatio: Math.round((24+rand()*28)*10)/10 },
    forecast: null,
  };
}

function makeDemoPeriods(code, name, sector) {
  const url = DEMO_COMPANIES.find(c=>c.code===code)?.url || '';
  return [2020,2021,2022,2023,2024].map(yr => ({
    id: `demo-${code}-${yr}`,
    sourceType: 'demo',
    sourceUrl: url,
    pdfUrl: '',
    companyName: name,
    sector,
    fiscalYear: yr,
    quarter: null,
    isAnnual: true,
    label: `${yr}年3月期 通期`,
    figures: makeFigures(code, yr, null),
    fetchedAt: new Date().toISOString(),
  }));
}

// ============================================================
// セッション状態（sessionStorage）
// ============================================================
let periods = JSON.parse(sessionStorage.getItem('fa-periods') || '[]');
let company = JSON.parse(sessionStorage.getItem('fa-company') || 'null');

function persist() {
  sessionStorage.setItem('fa-periods', JSON.stringify(periods));
  sessionStorage.setItem('fa-company', JSON.stringify(company));
}

function addPeriod(p) {
  const i = periods.findIndex(x => x.fiscalYear===p.fiscalYear && x.quarter===p.quarter && x.isAnnual===p.isAnnual);
  if (i >= 0) periods[i] = p; else periods.push(p);
  if (!company) company = { name:p.companyName, sector:p.sector };
  persist();
}

function deletePeriodById(id) {
  periods = periods.filter(p => p.id !== id);
  if (periods.length === 0) company = null;
  persist();
}

function clearSession() {
  periods = []; company = null;
  sessionStorage.removeItem('fa-periods');
  sessionStorage.removeItem('fa-company');
}

// ============================================================
// 分析データ構築
// ============================================================
function buildAnalysis() {
  if (!periods.length) return null;

  const sorted = [...periods].sort((a,b) =>
    a.fiscalYear !== b.fiscalYear ? a.fiscalYear-b.fiscalYear : (a.isAnnual?5:a.quarter)-(b.isAnnual?5:b.quarter)
  );

  const annuals   = sorted.filter(p => p.isAnnual);
  const quarters  = sorted.filter(p => !p.isAnnual);

  const annual = annuals.map(p => {
    const ta = p.figures.bs?.totalAssets ?? null;
    const na = p.figures.bs?.netAssets   ?? null;
    return {
      year:             p.fiscalYear,
      revenue:          p.figures.pl.revenue,
      operatingProfit:  p.figures.pl.operatingProfit,
      ordinaryProfit:   p.figures.pl.ordinaryProfit,
      netProfit:        p.figures.pl.netProfit,
      eps:              p.figures.pl.eps,
      totalAssets:      ta,
      totalLiabilities: (ta != null && na != null) ? ta - na : null,
      netAssets:        na,
      equityRatio:      p.figures.bs?.equityRatio ?? null,
      operatingCF:      p.figures.cf?.operating   ?? null,
      investingCF:      p.figures.cf?.investing   ?? null,
      financingCF:      p.figures.cf?.financing   ?? null,
      dividendAmount:   p.figures.dividend?.annual ?? null,
      payoutRatio:      p.figures.dividend?.payoutRatio ?? null,
      pdfUrl:           p.pdfUrl,
      yoy: null,
      bsYoy: null,
    };
  });

  for (let i=1; i<annual.length; i++) {
    const rv = annual[i-1].revenue   ? Math.round((annual[i].revenue  /annual[i-1].revenue  -1)*1000)/10 : null;
    const np = annual[i-1].netProfit ? Math.round((annual[i].netProfit/annual[i-1].netProfit-1)*1000)/10 : null;
    annual[i].yoy = { revenue:rv, netProfit:np };

    const pTA = annual[i-1].totalAssets;
    const pTL = annual[i-1].totalLiabilities;
    const pNA = annual[i-1].netAssets;
    annual[i].bsYoy = {
      totalAssets:      pTA ? Math.round((annual[i].totalAssets/pTA-1)*1000)/10 : null,
      totalLiabilities: pTL ? Math.round((annual[i].totalLiabilities/pTL-1)*1000)/10 : null,
      netAssets:        pNA ? Math.round((annual[i].netAssets/pNA-1)*1000)/10 : null,
    };
  }

  const quarterly = quarters.map(p => ({
    year:           p.fiscalYear,
    quarter:        p.quarter,
    label:          `${p.fiscalYear}Q${p.quarter}`,
    revenue:        p.figures.pl.revenue,
    operatingProfit:p.figures.pl.operatingProfit,
    netProfit:      p.figures.pl.netProfit,
  }));

  const co = company || { name: sorted[0].companyName, sector: sorted[0].sector };
  return {
    companyName:  co.name,
    sector:       co.sector,
    periodCount:  periods.length,
    latestYear:   annuals.length ? annuals[annuals.length-1].fiscalYear : null,
    annual,
    quarterly,
    forecast:     sorted[sorted.length-1].figures.forecast,
  };
}

// ============================================================
// コメント生成
// ============================================================
function makeComments(analysis) {
  const { annual } = analysis;
  const out = { annual:[], bs:[], cashflow:[], eps:[] };

  if (annual.length >= 2) {
    // 年次
    const last = annual[annual.length-1];
    const prev = annual[annual.length-2];

    if (annual.length >= 3) {
      const last3 = annual.slice(-3);
      const rates  = last3.slice(1).map((a,i)=>(a.revenue-last3[i].revenue)/last3[i].revenue*100);
      const avg    = rates.reduce((a,b)=>a+b,0)/rates.length;
      if (avg > 10)     out.annual.push(`直近3年の平均売上成長率は${avg.toFixed(1)}%と高水準`);
      else if (avg > 3) out.annual.push(`直近3年の平均売上成長率は${avg.toFixed(1)}%と安定成長`);
      else if (avg < 0) out.annual.push(`直近3年の売上は平均${avg.toFixed(1)}%の減少傾向。要注視`);
      else              out.annual.push(`売上成長率は${avg.toFixed(1)}%と横ばい傾向`);
    }

    if (last.revenue) out.annual.push(`最新期の営業利益率は${(last.operatingProfit/last.revenue*100).toFixed(1)}%`);

    const epsUp = annual.slice(1).filter((a,i)=>a.eps>annual[i].eps).length;
    if (epsUp>=3) out.annual.push(`EPSが${epsUp}期連続で成長し、収益性が継続改善`);

    if (last.yoy?.netProfit!=null) {
      const np = last.yoy.netProfit;
      if (np>20) out.annual.push(`最新期純利益は前年比+${np}%と大幅増益`);
      else if (np<-10) out.annual.push(`最新期純利益は前年比${np}%と減益。要注意`);
      else out.annual.push(`最新期純利益は前年比${np>=0?'+':''}${np}%`);
    }
    const opG = ((last.operatingProfit-prev.operatingProfit)/Math.abs(prev.operatingProfit)*100).toFixed(1);
    out.annual.push(`営業利益の前年成長率は${Number(opG)>=0?'+':''}${opG}%`);

    // BS（貸借対照表）
    const withBS = annual.filter(a => a.totalAssets != null && a.netAssets != null);
    if (withBS.length >= 1) {
      const lastBS  = withBS[withBS.length-1];
      const firstBS = withBS[0];

      // 自己資本比率の水準
      if (lastBS.equityRatio != null) {
        if      (lastBS.equityRatio > 60) out.bs.push(`自己資本比率${lastBS.equityRatio}%と非常に高く、財務の安定性は極めて高い`);
        else if (lastBS.equityRatio > 50) out.bs.push(`自己資本比率${lastBS.equityRatio}%と財務基盤は健全`);
        else if (lastBS.equityRatio > 30) out.bs.push(`自己資本比率${lastBS.equityRatio}%と標準的な財務構造`);
        else if (lastBS.equityRatio > 20) out.bs.push(`自己資本比率${lastBS.equityRatio}%とやや低め。負債比率に注意`);
        else                               out.bs.push(`自己資本比率${lastBS.equityRatio}%と財務レバレッジが高い。有利子負債の管理に要注意`);
      }

      // 自己資本比率トレンド
      if (withBS.length >= 3) {
        const earlyEq = withBS.slice(0,2).reduce((s,a)=>s+(a.equityRatio||0),0)/2;
        const lateEq  = withBS.slice(-2).reduce((s,a)=>s+(a.equityRatio||0),0)/2;
        const diff = lateEq - earlyEq;
        if      (diff >  5) out.bs.push(`自己資本比率は${diff.toFixed(1)}pt上昇。財務体質が改善傾向`);
        else if (diff < -5) out.bs.push(`自己資本比率が${Math.abs(diff).toFixed(1)}pt低下。負債依存度が高まっている`);
        else                out.bs.push(`自己資本比率は${earlyEq.toFixed(0)}～${lateEq.toFixed(0)}%と安定推移`);
      }

      // 総資産の成長
      if (withBS.length >= 2 && firstBS.totalAssets) {
        const taG = ((lastBS.totalAssets - firstBS.totalAssets) / firstBS.totalAssets * 100).toFixed(0);
        if      (Number(taG) > 20) out.bs.push(`${withBS.length}期間で総資産は${taG}%拡大。積極的な資産積み上げが続く`);
        else if (Number(taG) >  0) out.bs.push(`総資産は${taG}%増加。緩やかな資産拡大`);
        else                       out.bs.push(`総資産が${Math.abs(Number(taG))}%縮小。資産のスリム化が進行`);
      }

      // 総負債の絶対水準
      if (lastBS.totalLiabilities != null && lastBS.equityRatio != null) {
        out.bs.push(`最新期の総負債は${lastBS.totalLiabilities.toLocaleString()}億円（総資産の${(100-lastBS.equityRatio).toFixed(1)}%）`);
      }

      // 純資産の成長
      if (withBS.length >= 2 && firstBS.netAssets) {
        const naG = ((lastBS.netAssets - firstBS.netAssets) / firstBS.netAssets * 100).toFixed(0);
        if      (Number(naG) > 20) out.bs.push(`純資産は${naG}%増加。内部留保の着実な積み上げを確認`);
        else if (Number(naG) >  0) out.bs.push(`純資産は${naG}%増加と安定成長`);
        else                       out.bs.push(`純資産が${Math.abs(Number(naG))}%減少。配当・損失等の影響を確認`);
      }
    }
    out.bs = out.bs.slice(0, 5);

    // CF
    const withCF = annual.filter(a=>a.operatingCF!=null);
    if (withCF.length) {
      const neg = withCF.filter(a=>a.operatingCF<0).length;
      out.cashflow.push(neg===0
        ? '全期間で営業CFはプラスを維持。本業の現金創出力は堅調'
        : `${neg}期で営業CFがマイナス。本業の現金創出力に懸念`);
      const lCF = withCF[withCF.length-1];
      out.cashflow.push(`最新期フリーCF（営業+投資）は${(lCF.operatingCF+lCF.investingCF).toLocaleString()}億円`);
      out.cashflow.push(`投資CF ${Math.abs(lCF.investingCF).toLocaleString()}億円の支出。設備投資・M&Aへ積極配分`);
    }
    const lEq = annual[annual.length-1].equityRatio;
    if (lEq!=null) {
      if (lEq>50)      out.cashflow.push(`自己資本比率${lEq}%と財務基盤は健全`);
      else if (lEq<20) out.cashflow.push(`自己資本比率${lEq}%と財務レバレッジ高め。有利子負債に注意`);
      else             out.cashflow.push(`自己資本比率${lEq}%と標準的な財務構造`);
    }

    // EPS/配当
    if (last.eps && prev.eps) {
      const eg = ((last.eps-prev.eps)/Math.abs(prev.eps)*100).toFixed(1);
      out.eps.push(`EPS成長率は前年比${Number(eg)>=0?'+':''}${eg}%`);
    }
    const divArr = annual.filter(a=>a.dividendAmount!=null);
    if (divArr.length>=2) {
      const ups = divArr.slice(1).filter((a,i)=>a.dividendAmount>=divArr[i].dividendAmount).length;
      if (ups>=3) out.eps.push(`直近${ups}期で増配傾向。株主還元姿勢が継続`);
      const avgPO = (divArr.reduce((s,a)=>s+(a.payoutRatio||0),0)/divArr.length).toFixed(1);
      out.eps.push(`平均配当性向は${avgPO}%`);
    }
  }

  return out;
}

// ============================================================
// チャート
// ============================================================
const _charts = {};
function killChart(id) { if (_charts[id]) { _charts[id].destroy(); delete _charts[id]; } }
const dark = () => document.documentElement.classList.contains('dark');
const cc = () => ({ text: dark()?'#d1d5db':'#374151', grid: dark()?'#374151':'#e5e7eb' });

function drawChart(id, cfg) {
  killChart(id);
  const el = document.getElementById(id);
  if (el) _charts[id] = new Chart(el, cfg);
}

function drawAnnual(id, rows) {
  const c = cc();
  drawChart(id, {
    data: {
      labels: rows.map(r=>`${r.year}年3月期`),
      datasets: [
        { type:'bar',  label:'売上高',   data:rows.map(r=>r.revenue||0),         backgroundColor:'rgba(37,99,235,0.55)', borderColor:'#2563eb', borderWidth:1 },
        { type:'bar',  label:'営業利益', data:rows.map(r=>r.operatingProfit||0), backgroundColor:'rgba(249,115,22,0.55)', borderColor:'#f97316', borderWidth:1 },
        { type:'line', label:'純利益',   data:rows.map(r=>r.netProfit||0),       borderColor:'#10b981', borderWidth:2.5, pointRadius:5, tension:0.35, fill:false },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{ legend:{ labels:{ color:c.text, boxWidth:14 } },
                tooltip:{ callbacks:{ label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()} 億円` } } },
      scales:{ x:{ ticks:{ color:c.text }, grid:{ color:c.grid } },
               y:{ ticks:{ color:c.text, callback:v=>v.toLocaleString() }, grid:{ color:c.grid } } }
    }
  });
}

function drawQuarterly(id, rows) {
  const c = cc();
  drawChart(id, {
    type:'line',
    data:{
      labels: rows.map(r=>r.label),
      datasets:[
        { label:'売上高',   data:rows.map(r=>r.revenue||0),         borderColor:'#2563eb', backgroundColor:'rgba(37,99,235,0.08)',  tension:0.35, fill:true,  pointRadius:3 },
        { label:'営業利益', data:rows.map(r=>r.operatingProfit||0), borderColor:'#f97316', tension:0.35, fill:false, pointRadius:3 },
        { label:'純利益',   data:rows.map(r=>r.netProfit||0),       borderColor:'#10b981', tension:0.35, fill:false, pointRadius:3 },
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ color:c.text, boxWidth:14 } },
                tooltip:{ callbacks:{ label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()} 億円` } } },
      scales:{ x:{ ticks:{ color:c.text, maxRotation:45, font:{size:10} }, grid:{ color:c.grid } },
               y:{ ticks:{ color:c.text, callback:v=>v.toLocaleString() }, grid:{ color:c.grid } } }
    }
  });
}

function drawCF(id, rows) {
  const c = cc();
  drawChart(id, {
    type:'bar',
    data:{
      labels: rows.map(r=>`${r.year}年3月期`),
      datasets:[
        { label:'営業CF', data:rows.map(r=>r.operatingCF||0), backgroundColor:'rgba(37,99,235,0.7)'  },
        { label:'投資CF', data:rows.map(r=>r.investingCF||0), backgroundColor:'rgba(249,115,22,0.7)' },
        { label:'財務CF', data:rows.map(r=>r.financingCF||0), backgroundColor:'rgba(139,92,246,0.7)' },
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ color:c.text, boxWidth:14 } },
                tooltip:{ callbacks:{ label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()} 億円` } } },
      scales:{ x:{ ticks:{ color:c.text }, grid:{ color:c.grid } },
               y:{ ticks:{ color:c.text, callback:v=>v.toLocaleString() }, grid:{ color:c.grid } } }
    }
  });
}

function drawBS(id, rows) {
  const c = cc();
  drawChart(id, {
    type: 'bar',
    plugins: [ChartDataLabels],
    data: {
      labels: rows.map(r=>`${r.year}年3月期`),
      datasets: [
        {
          label: '純資産',
          data:  rows.map(r => r.netAssets || 0),
          backgroundColor: 'rgba(16,185,129,0.70)',
          borderColor: '#10b981',
          borderWidth: 1,
          stack: 'bs',
        },
        {
          label: '総負債',
          data:  rows.map(r => r.totalLiabilities || 0),
          backgroundColor: 'rgba(249,115,22,0.65)',
          borderColor: '#f97316',
          borderWidth: 1,
          stack: 'bs',
        },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: c.text, boxWidth: 14 } },
        tooltip: {
          callbacks: {
            label:  ctx  => `${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()} 億円`,
            footer: items => {
              const ta = items.reduce((s,i) => s + i.parsed.y, 0);
              return `総資産合計: ${ta.toLocaleString()} 億円`;
            },
          }
        },
        datalabels: {
          color: '#fff',
          anchor: 'center',
          align: 'center',
          font: { weight: 'bold', size: 11 },
          formatter: (value, ctx) => {
            const total = ctx.chart.data.datasets.reduce(
              (s, ds) => s + (ds.data[ctx.dataIndex] || 0), 0
            );
            if (!total || !value) return '';
            const pct = Math.round(value / total * 100);
            return pct >= 7 ? `${pct}%` : '';
          }
        }
      },
      scales: {
        x: { ticks: { color: c.text }, grid: { color: c.grid }, stacked: true },
        y: { ticks: { color: c.text, callback: v => v.toLocaleString() }, grid: { color: c.grid }, stacked: true }

// ============================================================
// URL取り込み（処理ステップシミュレーション）
// ============================================================
let fetching = false;
const sleep = ms => new Promise(r => setTimeout(r, ms));

function hashStr(s) {
  let h = 0;
  for (let i=0; i<s.length; i++) h = Math.imul(31,h) + s.charCodeAt(i) | 0;
  return (h >>> 0);
}

window.startFetch = async function() {
  const inp = document.getElementById('url-input');
  const raw = inp?.value?.trim();
  if (!raw) { showFetchMsg('error', 'URLを入力してください'); return; }
  let urlObj;
  try { urlObj = new URL(raw); } catch { showFetchMsg('error', '有効なURL形式で入力してください（https://...）'); return; }
  if (!['http:','https:'].includes(urlObj.protocol)) { showFetchMsg('error', 'http または https のURLを入力してください'); return; }
  if (fetching) return;

  fetching = true;
  document.getElementById('fetch-btn').disabled = true;
  document.getElementById('fetch-msg').innerHTML = '';
  const wrap = document.getElementById('step-wrap');
  wrap.classList.remove('hidden');

  const st = {};
  const upd = () => { wrap.innerHTML = stepsHTML(st); };

  const doStep = async (id, ms, fail=false) => {
    st[id] = 'active'; upd(); await sleep(ms);
    if (fail) { st[id]='error'; upd(); return false; }
    st[id] = 'done'; upd(); return true;
  };

  try {
    await doStep('validate', 700);
    await doStep('robots',   500);
    await doStep('crawl',    1300);
    await doStep('find',     1000);
    await doStep('download', 900);
    await doStep('extract',  1400);

    await sleep(200);
    wrap.classList.add('hidden');

    const demo = DEMO_COMPANIES[hashStr(raw) % DEMO_COMPANIES.length];
    makeDemoPeriods(demo.code, demo.name, demo.sector).forEach(addPeriod);
    refreshPeriodUI();
    inp.value = '';
    showFetchMsg('info', `⚠️ ブラウザ版はCORS制限によりリアルデータ取得不可のため、「${demo.name}」のデモデータ（5期分）を取り込みました。`);
  } catch(e) {
    showFetchMsg('error', e.message || '取り込みに失敗しました');
  } finally {
    fetching = false;
    document.getElementById('fetch-btn').disabled = false;
  }
};

function showFetchMsg(type, msg) {
  const styles = {
    error: 'bg-red-50 dark:bg-red-950/30 border-red-200 dark:border-red-800 text-red-700 dark:text-red-300',
    info:  'bg-amber-50 dark:bg-amber-950/30 border-amber-200 dark:border-amber-800 text-amber-700 dark:text-amber-300',
    ok:    'bg-green-50 dark:bg-green-950/30 border-green-200 dark:border-green-800 text-green-700 dark:text-green-300',
  };
  document.getElementById('fetch-msg').innerHTML =
    `<div class="mt-3 p-3 rounded-xl border text-sm ${styles[type]}">${msg}</div>`;
}

async function processPDF(file) {
  showUploadMsg('info', `<span class="flex items-center gap-2"><svg class="w-4 h-4 spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>${file.name} を読み込み中...</span>`);
  try {
    const buf  = await readFileBuffer(file);
    const text = await pdfToText(buf);
    const ok   = verifyKessan(text);
    if (!ok) { showUploadMsg('warn', '⚠️ 決算短信と判定できませんでした。売上高・営業利益等の語句が含まれるPDFを使用してください。'); return; }
    const figs = extractFigures(text);
    const p    = buildPeriod(figs, file.name);
    addPeriod(p);
    refreshPeriodUI();

    const hits = [
      figs.pl.revenue         != null && `売上高: ${figs.pl.revenue.toLocaleString()}億円`,
      figs.pl.operatingProfit != null && `営業利益: ${figs.pl.operatingProfit.toLocaleString()}億円`,
      figs.pl.netProfit       != null && `純利益: ${figs.pl.netProfit.toLocaleString()}億円`,
    ].filter(Boolean);

    if (hits.length) showUploadMsg('ok',  `✓ 取り込み完了：${file.name}<br><span class="text-xs">${hits.join(' ／ ')}</span>`);
    else             showUploadMsg('warn', `⚠️ 取り込みましたが数値の自動抽出が一部失敗しました。手動で確認してください。（${file.name}）`);

  } catch(e) {
    showUploadMsg('error', `PDF読み込みエラー: ${e.message}`);
  }
}

function readFileBuffer(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = () => rej(new Error('ファイル読み込みに失敗しました'));
    r.readAsArrayBuffer(file);
  });
}

async function pdfToText(buffer) {
  if (typeof pdfjsLib === 'undefined') throw new Error('PDF.jsが読み込めていません（インターネット接続を確認してください）');
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
  const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
  let text = '';
  for (let i=1; i<=Math.min(pdf.numPages, 12); i++) {
    const page    = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it=>it.str).join(' ') + '\n';
  }
  return text;
}

function verifyKessan(text) {
  const keywords = ['売上高','営業利益','経常利益','当期純利益','四半期','連結'];
  return keywords.filter(k => text.includes(k)).length >= 3;
}

// ============================================================
// PDF数値抽出
// ============================================================
function extractFigures(raw) {
  const t = raw.replace(/,/g,'').replace(/[　 ]/g,' ');
  const figs = { pl:{}, bs:{}, cf:{}, dividend:{} };

  // 単位判定
  const isM = /[（(]百万円[）)]/.test(raw);  // 百万円表記 → ÷100して億円
  const isK = /[（(]千円[）)]/.test(raw);    // 千円表記  → ÷100000して億円
  const conv = v => {
    if (v == null) return null;
    if (isM) return Math.round(v / 100);
    if (isK) return Math.round(v / 100000);
    return v;
  };

  function pick(patterns) {
    for (const pat of patterns) {
      const m = t.match(pat);
      if (m) {
        const n = parseInt(m[1].replace(/[^\d]/g,''));
        if (!isNaN(n) && n > 0) return n;
      }
    }
    return null;
  }

  figs.pl.revenue         = conv(pick([/売上高\s{0,5}(\d{4,14})/,/売上収益\s{0,5}(\d{4,14})/,/営業収益\s{0,5}(\d{4,14})/]));
  figs.pl.operatingProfit = conv(pick([/営業利益\s{0,5}(\d{3,14})/]));
  figs.pl.ordinaryProfit  = conv(pick([/経常利益\s{0,5}(\d{3,14})/]));
  figs.pl.netProfit       = conv(pick([/親会社株主に帰属する当期純利益\s{0,5}(\d{3,14})/,/当期純利益\s{0,5}(\d{3,14})/]));
  figs.pl.eps             = pick([/1\s*株当たり当期純利益\s{0,5}(\d+(?:[.,]\d+)?)/]);

  figs.bs.totalAssets     = conv(pick([/総資産\s{0,5}(\d{4,14})/]));
  figs.bs.netAssets       = conv(pick([/純資産合計\s{0,5}(\d{4,14})/,/純資産\s{0,5}(\d{4,14})/]));
  const erMatch = t.match(/自己資本比率\s{0,5}(\d+(?:[.,]\d+)?)/);
  if (erMatch) figs.bs.equityRatio = parseFloat(erMatch[1]);

  figs.cf.operating = conv(pick([/営業活動による\s*キャッシュ\s*[\s\S]{0,10}?(\d{3,14})/]));
  figs.cf.investing = conv(pick([/投資活動による\s*キャッシュ\s*[\s\S]{0,10}?(\d{3,14})/]));
  figs.cf.financing = conv(pick([/財務活動による\s*キャッシュ\s*[\s\S]{0,10}?(\d{3,14})/]));
  if (figs.cf.investing != null) figs.cf.investing = -figs.cf.investing;
  if (figs.cf.financing != null) figs.cf.financing = -figs.cf.financing;

  figs.dividend.annual = pick([/1株当たり配当金\s{0,5}(\d+(?:[.,]\d+)?)/,/年間配当\s{0,5}(\d+(?:[.,]\d+)?)/]);

  return figs;
}

function buildPeriod(figs, filename) {
  // 会計年度・四半期を推定
  const raw = filename + ' ';
  const yrM  = raw.match(/(\d{4})年(\d{1,2})月期/) || [];
  const qM   = raw.match(/第([1-4])四半期/);
  const yr   = yrM[1] ? parseInt(yrM[1]) : new Date().getFullYear();
  const q    = qM ? parseInt(qM[1]) : null;
  const isA  = !q;
  const lbl  = isA ? `${yr}年3月期 通期` : `${yr}年3月期 第${q}四半期`;
  const cname = filename.replace(/[_\-（）()]/g,' ').replace(/\.pdf$/i,'').trim().slice(0,20) || 'アップロード';

  return {
    id: `file-${Date.now()}`,
    sourceType: 'file',
    sourceUrl: '',
    pdfUrl: filename,
    companyName: cname,
    sector: '',
    fiscalYear: yr,
    quarter: q,
    isAnnual: isA,
    label: lbl,
    figures: { pl:figs.pl, bs:figs.bs, cf:figs.cf, dividend:figs.dividend, forecast:null },
    fetchedAt: new Date().toISOString(),
  };
}

window.calcPER = function() {
  const price = parseFloat(document.getElementById('price-input')?.value);
  const el = document.getElementById('per-out');
  if (!el) return;
  if (!_analysis?.annual?.length || !price || price <= 0) { el.textContent = ''; return; }
  const eps = _analysis.annual[_analysis.annual.length-1]?.eps;
  if (!eps || eps <= 0) { el.textContent = 'EPS取得不可'; return; }
  const per = (price / eps).toFixed(1);
  const peg = _analysis.annual.length >= 2 ? (() => {
    const prev = _analysis.annual[_analysis.annual.length-2];
    const g = ((eps - prev.eps) / Math.abs(prev.eps)) * 100;
    return g > 0 ? (per / g).toFixed(2) : null;
  })() : null;
  el.textContent = `PER: ${per}倍${peg ? `　PEG: ${peg}倍` : ''}`;
};
